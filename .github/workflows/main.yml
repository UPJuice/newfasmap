name: Cleanup Large Files

on:
  workflow_dispatch:

# 关键修正：授予写入和内容操作的权限
permissions:
  contents: write
  actions: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: |
          sudo apt-get update
          sudo apt-get install -y git-filter-repo

      - name: Remove large folders from history
        run: |
          git filter-repo --path frames/honey_farm --path frames/iron_farm --invert-paths --force

      # 关键修正：使用更安全的 force-with-lease 推送方式
      - name: Force push to clean the remote
        run: |
          git push origin --force-with-lease --all
