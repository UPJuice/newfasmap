name: Cleanup Large Files

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: |
          sudo apt-get update
          sudo apt-get install -y git-filter-repo

      - name: Remove large folders from history
        run: |
          git filter-repo --path frames/honey_farm --path frames/iron_farm --invert-paths --force

      - name: Re-add origin remote
        run: |
          git remote add origin https://github.com/UPJuice/newfasmap.git

      - name: Force push to clean the remote
        run: |
          git push origin --force --all
