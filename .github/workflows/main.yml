name: Cleanup Large Files

on:
  workflow_dispatch:  # 让你可以手动点击运行

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，必须的

      - name: Install git-filter-repo
        run: |
          sudo apt-get update
          sudo apt-get install -y git-filter-repo

      - name: Remove large folders from history
        run: |
          # 删除 frames/honey_farm 和 frames/iron_farm 这两个文件夹的所有历史记录
          git filter-repo --path frames/honey_farm --path frames/iron_farm --invert-paths --force

      - name: Force push to clean the remote
        run: |
          git push origin --force --all
